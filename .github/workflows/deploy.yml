name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "gevorg227@gmail.com"
          git config --global user.name "Gevorg Karagozian"
          git push https://Gevorg22:$HF_TOKEN@huggingface.co/spaces/Gevorg22/gkara-save-bot main --force
